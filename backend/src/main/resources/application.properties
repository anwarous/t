spring.application.name=learningplusplus-api
server.port=8081

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:LearningDataBase}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:anwer}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:test}}

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# H2 Console
spring.h2.console.enabled=false

# Initialize data after schema creation
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT
app.jwt.secret=learningplusplus-super-secret-key-change-in-production-must-be-very-long-at-least-256bits
app.jwt.expiration-ms=604800000

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# LLM Mentor (OpenAI-compatible API)
app.llm.base-url=${APP_LLM_BASE_URL:https://api.openai.com/v1}
app.llm.api-key=${APP_LLM_API_KEY:}
app.llm.model=${APP_LLM_MODEL:gpt-4o-mini}
app.llm.temperature=${APP_LLM_TEMPERATURE:0.3}
app.llm.max-tokens=${APP_LLM_MAX_TOKENS:450}
app.llm.system-prompt=${APP_LLM_SYSTEM_PROMPT:You are Learning++ Mentor, an algorithm tutor. Explain clearly, give hints before full solutions, and keep answers concise and practical.}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
