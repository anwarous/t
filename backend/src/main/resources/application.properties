spring.application.name=mqacademy-api
server.port=8080

# H2 (dev) - file-based so data persists across restarts
spring.datasource.url=jdbc:h2:file:./data/mqacademy;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Initialize data after schema creation
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT
app.jwt.secret=mqacademy-super-secret-key-change-in-production-must-be-very-long-at-least-256bits
app.jwt.expiration-ms=604800000

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
