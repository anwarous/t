spring.application.name=mqacademy-api
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:LearningDataBase}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=anwer
spring.datasource.password=test

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Initialize data after schema creation
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT
app.jwt.secret=mqacademy-super-secret-key-change-in-production-must-be-very-long-at-least-256bits
app.jwt.expiration-ms=604800000

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
