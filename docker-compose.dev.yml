services:
  backend:
    environment:
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173},http://localhost:5174

  frontend:
    build: !reset null
    image: node:20-alpine
    pull_policy: always
    working_dir: /app
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8081/api}
      VITE_ALGO_COMPILER_URL: ${VITE_ALGO_COMPILER_URL:-/algo-api}
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
      ALGO_COMPILER_PROXY_TARGET: ${ALGO_COMPILER_PROXY_TARGET:-http://algo-compiler:5000}
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules
    ports: !override
      # Expose only Vite dev server on host 5174.
      - "5174:5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173 >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s

  algo-compiler:
    environment:
      ALLOWED_ORIGIN: ${ALGO_ALLOWED_ORIGIN:-http://localhost:5174}

volumes:
  frontend_node_modules:
